# ttx presets — keys are the CLI flags (dashes ok), values fill in defaults.
# Explicit CLI flags always override the preset.
# "default" applies automatically when you pass no exit flags at all.

# any size: sell half at +60%, a quarter at +100%, trail the rest (floored per tranche)
[default]
scale = "50%@+60%,25%@+100%"
stop = "-30%"
trail = "30%"
exit-by = "15:50"
one-lot = "bracket"  # 1-contract positions use this preset instead (scale-outs need >1)

# single contract: bracket with breakeven + trailing ratchets
[bracket]
target = "+100%"
stop = "-30%"
be-at = "+50%"
trail-at = "+80%"
trail = "25%"

# conviction days: no target, the trail is the only upside exit — uncapped
[moon]
stop = "-30%"
be-at = "+50%"
trail-at = "+100%"
trail = "35%"
exit-by = "15:50"

# credit spread: close at 50% of max profit, stop at 2x credit
[spread]
target = "+50%"
stop = "-100%"
